{{- if .Values.ingress.enabled }}
{{- if not (or .Values.frontend.enabled .Values.backend.enabled) }}
{{- fail "ingress.enabled requires at least one of frontend.enabled or backend.enabled to be true" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "example-chart.fullname" . }}-ingress
  labels:
    {{- include "example-chart.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
  - host: {{ required "ingress.host is required" .Values.ingress.host | quote }}
    http:
      paths:
      {{- if .Values.backend.enabled }}
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: {{ include "example-chart.fullname" . }}-backend-svc
            port:
              number: {{ .Values.backend.port | default 8080 }}
      {{- end }}
      {{- if .Values.frontend.enabled }}
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ include "example-chart.fullname" . }}-frontend-svc
            port:
              number: {{ .Values.frontend.port | default 80 }}
      {{- end }}
{{- end }}
